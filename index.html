<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Orient Wolf Game 🌙🐺</title>
<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
<div class="container">
  <h1>Orient Wolf Game 🌙🐺</h1>

  <div id="joinDiv">
    <input type="text" id="playerName" placeholder="Enter your name">
    <button id="joinBtn">Join Game</button>
  </div>

  <div id="game" style="display:none;">
    <h2>Players:</h2>
    <ul id="playersList"></ul>
    <p id="roleDisplay"></p>

    <div id="nightDiv" style="display:none;">
      <h3>Night Phase</h3>
      <div id="nightActions"></div>
      <button id="nextPhaseBtn">End Night</button>
    </div>

    <div id="dayDiv" style="display:none;">
      <h3>Day Phase - Vote</h3>
      <div id="voteList"></div>
      <button id="voteBtn">Submit Vote</button>
    </div>

    <div id="messageDiv"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
